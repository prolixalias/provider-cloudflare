name: Publish Provider Package

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version string to use while publishing the package (e.g. v1.0.0-alpha.1)"
        default: ''
        required: false
      go-version:
        description: 'Go version to use if building needs to be done'
        default: '1.25'
        required: false

jobs:
  publish-provider-package:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
    uses: crossplane-contrib/provider-workflows/.github/workflows/publish-provider.yml@main
    with:
      repository: provider-cloudflare
      version: ${{ github.event.inputs.version || (github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'main') }}
      go-version: ${{ github.event.inputs.go-version || '1.25' }}
      cleanup-disk: true
    secrets:
      GHCR_PAT: ${{ secrets.GITHUB_TOKEN }}
